version: "3.8"

services:
  postgres:
    image: postgres:17-alpine
    container_name: leadflow-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: leadflow
      POSTGRES_PASSWORD: leadflow_secret
      POSTGRES_DB: leadflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
